<!DOCTYPE html>
<html>
    <head>
    <title> Fruit Quality Classification System</title>
    <style>
        body{
            margin:0;
            background:linear-gradient(135deg,#E8F5E9,#C8E6C9,#F1F8E9);
            font-family: Arial,sans-serif;
            display:flex;
            justify-content: center;
            align-items:center;
            height:100vh;
        }
        
        .container{
            background-color:white ;
            width:500px;
            margin: 70pxauto;
            margin-top:7px;
            padding:35px;
            text-align:center;
            border-radius: 20px;
            box-shadow:0px 10px 25px rgba(0,0,0,2);
        }
        h1{
            color:#2E7D32;
            font-size:36px;
        }
        P{
            color:#555;
            font-size:18px;
        }
        .upload{
            margin-top:25px;
            padding:25px;
            background:#F1F8E9;
            border:2px dashed #81C784;
            border-radius:15px
        }
        input[type=file]{
            margin-top:15px;
            font-size:16px;

        }
        button{
            background-color:#43A047;
            color:white;
            border:none;
            padding:12px 35px;
            margin-top:25px;
            border-radius: 10px;
            font-size: 18px;
            cursor:pointer;
        }
        button:hover{
            background-color:#2E7D32;
        }
        </style>
    </head>
    <body>
    <div class="container">
        <h1> Fruit Quality Classification System</h1>
        <p> Upload a fruit image</p>
        <form action="/result" method="GET">
    
            <div class="upload">
                <h3> Seleect Fruit Image</h3>
            <input type="file" name="file" required>
            </div>
        <br> 
        <button type="submit"> Predict Quality </button>
        </form>
    </div>
    </body>
</html>
