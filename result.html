<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;
            background:#F8F5F0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{

            background:white;
            width:450px;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0px 4px 15px rgba(0,0,0,0.2);

        }

        h1{

            color:#2E7D32;
            margin-bottom:5px;

        }

        h2{

            color:#666;
            margin-bottom:20px;

        }

        img{

            width:220px;
            height:220px;
            border-radius:10px;
            border:2px solid #ddd;

        }

        .heading{

            font-size:20px;
            margin-top:20px;
            color:#444;

        }

        .result{

            font-size:30px;
            color:#2E7D32;
            font-weight:bold;

        }

        .confidence{

            font-size:20px;
            color:#444;

        }

        .message{

            background:#E8F5E9;
            color:#2E7D32;
            padding:12px;
            border-radius:8px;
            margin-top:20px;
            font-weight:bold;

        }

        button{

            margin-top:25px;
            background:#6D8B74;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;

        }

        button:hover{

            background:#557A64;

        }

    </style>

</head>

<body>

<div class="container">

<h1>Image Based Fruit Quality Classification</h1>

<h2>Prediction Result</h2>

<img src="https://via.placeholder.com/220" alt="Fruit">

<p class="heading">Prediction</p>

<p class="result">Fresh</p>

<p class="heading">Confidence Score</p>

<p class="confidence">98.64%</p>

<div class="message">

✅ Fruit is Fresh and Good Quality

</div>

<button onclick="window.location.href='/'">

Predict Another Image

</button>

</div>

</body>
</html>
